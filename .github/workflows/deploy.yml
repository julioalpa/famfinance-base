name: Deploy to Fly.io

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno a deployar'
        required: false
        default: 'production'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only --app famfinance-falling-brook-6007
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
