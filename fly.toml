# fly.toml — FamFinance
# Docs: https://fly.io/docs/reference/configuration/

app            = "famfinance"
primary_region = "gru"          # São Paulo — el más cercano a Argentina

[build]
  dockerfile = "Dockerfile.prod"

# Variables de entorno no sensibles (los secretos van con `fly secrets set`)
[env]
  APP_NAME        = "FamFinance"
  APP_ENV         = "production"
  APP_DEBUG       = "false"
  APP_LOCALE      = "es"
  LOG_CHANNEL     = "stderr"
  LOG_LEVEL       = "error"
  SESSION_DRIVER  = "database"
  SESSION_LIFETIME = "120"
  CACHE_STORE     = "database"
  QUEUE_CONNECTION = "sync"
  FILESYSTEM_DISK = "local"
  BCRYPT_ROUNDS   = "12"

# Volumen persistente para storage de Laravel (imports CSV, etc.)
[[mounts]]
  source      = "famfinance_storage"
  destination = "/var/www/html/storage/app"
  initial_size = "1gb"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 30
    soft_limit = 25

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
